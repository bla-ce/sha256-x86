name: sha256-x86 CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nasm
        run: sudo apt-get update && sudo apt-get install -y nasm
      - name: Run tests
        run: make
